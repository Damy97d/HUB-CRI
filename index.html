<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRI Tools Hub</title>
    <style>
        :root { --cri-red: #c8102e; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            color: #333;
        }

        /* Sfondo dinamico */
        #background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }

        .header {
            text-align:center; margin-bottom:2rem; position:relative; z-index: 2;
        }
        h1 { color: var(--cri-red); font-size: 2.8rem; text-shadow: 0 2px 10px rgba(200,16,46,0.2); }
        .admin-btn {
            position:absolute; top:15px; right:20px; padding:8px 16px;
            background:var(--cri-red); color:white; border:none; border-radius:8px;
            cursor:pointer; z-index: 10;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(200,16,46,0.25);
            border-color: var(--cri-red);
        }
        .icon { font-size: 4.5rem; margin-bottom: 15px; }
        .card h3 { color: var(--cri-red); margin-bottom: 8px; }
        .card p { color: #555; line-height: 1.5; }

        /* Modali */
        #adminPanel, #passwordModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
            z-index: 10000;
        }
        .admin-box, .modal-box {
            background: white; padding: 2rem; border-radius: 20px; width: 90%; max-width: 900px;
            max-height: 90vh; overflow-y: auto;
        }
        table { width:100%; border-collapse:collapse; margin:15px 0; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#f1f1f1; }
        input, select { width:100%; padding:8px; margin:5px 0; border-radius:6px; border:1px solid #ccc; }
        button { padding:10px 16px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
    </style>
</head>
<body>

    <canvas id="background"></canvas>

    <div class="header">
        <button class="admin-btn" onclick="openAdmin()">⚙️ Admin Panel</button>
        <h1>🛠️ CRI Tools Hub</h1>
        <p style="color:#555;">Clicca sul tool desiderato</p>
    </div>

    <div class="grid" id="toolsGrid"></div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel">
        <div class="admin-box">
            <h2>🔧 Pannello Amministratore</h2>
            <p><strong>Password Admin:</strong> Stark1997</p>

            <h3>Aggiungi / Modifica Tool</h3>
            <div style="margin:20px 0; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input type="text" id="newName" placeholder="Nome Tool">
                <input type="text" id="newIcon" placeholder="Emoji Icona (es. 📋)">
                <input type="text" id="newUrl" placeholder="Link GitHub Raw">
                <input type="password" id="newPass" placeholder="Password (lascia vuoto = nessuna)">
            </div>
            <button onclick="addTool()">💾 Salva Tool</button>

            <h3 style="margin-top:25px;">Tool Esistenti</h3>
            <table id="adminTable">
                <thead><tr><th>Nome</th><th>Icona</th><th>Link</th><th>Password</th><th>Azioni</th></tr></thead>
                <tbody></tbody>
            </table>

            <div style="margin-top:20px;">
                <button onclick="closeAdmin()" style="background:#666;">Chiudi</button>
                <button onclick="resetTools()" style="background:#dc2626; color:white;">Reset Tutto</button>
            </div>
        </div>
    </div>

    <!-- MODALE PASSWORD -->
    <div id="passwordModal">
        <div class="modal-box">
            <h2 id="modalTitle">Inserisci Password</h2>
            <input type="password" id="modalPasswordInput" placeholder="Password" style="width:100%; padding:12px; font-size:1.1rem; margin:15px 0;">
            <div style="display:flex; gap:10px;">
                <button onclick="cancelPassword()" style="background:#666; flex:1;">Annulla</button>
                <button onclick="submitPassword()" style="background:var(--cri-red); color:white; flex:1;">Conferma</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== SFONDO DINAMICO ====================
        const canvas = document.getElementById('background');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: 0, y: 0 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < 250) {
                    this.speedX += dx / 8000;
                    this.speedY += dy / 8000;
                }

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(200, 16, 46, 0.65)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 90; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

        // ==================== TOOLS ====================
        let tools = JSON.parse(localStorage.getItem('cri_tools')) || [
            { name: "Sistema Assunzioni", icon: "📋", url: "https://damy97d.github.io/Sistema-Assunzioni-Cri---Damy_97/", pass: "Dirigenzacri" },
            { name: "Bonus Settimanali", icon: "🌟", url: "https://damy97d.github.io/Generatore-Bonus-Cri-by-Damy_97/", pass: "Ammcri" },
            { name: "Generatore Certificati", icon: "📄", url: "https://damy97d.github.io/CRI-Certificati-generator/", pass: null },
            { name: "Gestione Fatturato", icon: "💰", url: "https://damy97d.github.io/Calcolo-Fatturato-By-Damy_97-Stark/", pass: "Ammcri" },
            { name: "Organico", icon: "👥", url: "https://docs.google.com/spreadsheets/d/1rEyk7koAk5UVk6G3mlclu4nU-Pw5p3TM6FqWyBO2vg4/edit?usp=sharing", pass: null },
            { name: "Drive Contratti", icon: "🗂️", url: "https://drive.google.com/drive/folders/1wnsmt-vxMJaOTGs0wB1L1H19ysdzxOwS?usp=drive_link", pass: "Dirigenzacri" }
        ];

        let currentTool = null;

        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = '';

            tools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="icon">${tool.icon}</span>
                    <h3>${tool.name}</h3>
                    <p>Clicca per aprire</p>
                `;
                card.onclick = () => openTool(tool);
                grid.appendChild(card);
            });
        }

        function openTool(tool) {
            if (!tool.pass) {
                window.open(tool.url, '_blank');
                return;
            }

            currentTool = tool;
            document.getElementById('modalTitle').textContent = `Password per ${tool.name}`;
            document.getElementById('modalPasswordInput').value = '';
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('modalPasswordInput').focus();
        }

        function submitPassword() {
            const input = document.getElementById('modalPasswordInput').value.trim();
            document.getElementById('passwordModal').style.display = 'none';

            if (input === currentTool.pass) {
                window.open(currentTool.url, '_blank');
            } else {
                alert("❌ Password errata!");
            }
            currentTool = null;
        }

        function cancelPassword() {
            document.getElementById('passwordModal').style.display = 'none';
            currentTool = null;
        }

        // ==================== ADMIN PANEL ====================
        function openAdmin() {
            const pass = prompt("Inserisci password Admin:");
            if (pass !== "Stark1997") {
                alert("❌ Password Admin errata!");
                return;
            }
            document.getElementById('adminPanel').style.display = 'flex';
            renderAdminTable();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function renderAdminTable() {
            const tbody = document.querySelector('#adminTable tbody');
            tbody.innerHTML = '';

            tools.forEach((tool, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${tool.name}</td>
                    <td>${tool.icon}</td>
                    <td style="font-size:0.85em; word-break:break-all;">${tool.url}</td>
                    <td>${tool.pass ? '••••••••' : '<i>nessuna</i>'}</td>
                    <td>
                        <button onclick="editTool(${i})" style="background:#1976d2;color:white;">Modifica</button>
                        <button onclick="deleteTool(${i})" style="background:#dc2626;color:white;">Elimina</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        let editingIndex = -1;

        function editTool(index) {
            const tool = tools[index];
            editingIndex = index;
            document.getElementById('newName').value = tool.name;
            document.getElementById('newIcon').value = tool.icon;
            document.getElementById('newUrl').value = tool.url;
            document.getElementById('newPass').value = tool.pass || '';
        }

        function addTool() {
            const name = document.getElementById('newName').value.trim();
            const icon = document.getElementById('newIcon').value.trim() || "🔧";
            const url = document.getElementById('newUrl').value.trim();
            const pass = document.getElementById('newPass').value.trim();

            if (!name || !url) {
                alert("Nome e Link sono obbligatori!");
                return;
            }

            if (editingIndex >= 0) {
                tools[editingIndex] = { name, icon, url, pass: pass || null };
                editingIndex = -1;
            } else {
                tools.push({ name, icon, url, pass: pass || null });
            }

            localStorage.setItem('cri_tools', JSON.stringify(tools));
            renderTools();
            renderAdminTable();

            document.getElementById('newName').value = '';
            document.getElementById('newIcon').value = '';
            document.getElementById('newUrl').value = '';
            document.getElementById('newPass').value = '';
        }

        function deleteTool(index) {
            if (confirm("Eliminare questo tool?")) {
                tools.splice(index, 1);
                localStorage.setItem('cri_tools', JSON.stringify(tools));
                renderTools();
                renderAdminTable();
            }
        }

        function resetTools() {
            if (confirm("Ripristinare i tool di default?")) {
                localStorage.removeItem('cri_tools');
                location.reload();
            }
        }

        // Avvio
        renderTools();
        resizeCanvas();
        initParticles();
        animate();
    </script>
</body>
</html>
